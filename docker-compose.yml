version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ecommerce
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - '3002:3001'
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: admin
      DB_NAME: ecommerce
      JWT_SECRET: a6b2bb9af27ea7531481ac26a4f5fe5fc83ea2018bb4d0692fc892e0021a47f5
      JWT_EXPIRES_IN: 7d
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: